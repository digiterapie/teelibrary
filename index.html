<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a7c79" />
  <meta name="description" content="TeeLibrary — osobní knihovna webových aplikací od Terezy" />
  <title>📚 TeeLibrary</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal-deep:   #0a7c79;
      --teal-mid:    #14b8a6;
      --teal-light:  #5eead4;
      --teal-pale:   #ccfbf1;
      --teal-glow:   #0d9488;
      --bg:          #f0fdfa;
      --card-bg:     #ffffff;
      --text:        #134e4a;
      --text-soft:   #5f9ea0;
      --shadow-sm:   0 2px 8px rgba(10, 124, 121, 0.08);
      --shadow-md:   0 8px 24px rgba(10, 124, 121, 0.12);
      --shadow-lg:   0 16px 48px rgba(10, 124, 121, 0.18);
      --radius:      20px;
      --radius-sm:   12px;
    }

    html, body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body {
      position: relative;
      padding-bottom: 60px;
    }

    /* Dekorativní gradienty na pozadí */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      opacity: 0.35;
    }
    body::before {
      top: -150px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--teal-light), transparent 70%);
    }
    body::after {
      bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--teal-pale), transparent 70%);
    }

    /* ========== LAYOUT ========== */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 20px;
    }

    /* ========== HEADER ========== */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-logo {
      font-size: 40px;
      animation: float 4s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 900;
      background: linear-gradient(135deg, var(--teal-deep), var(--teal-mid));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .brand-subtitle {
      font-size: 14px;
      color: var(--text-soft);
      margin-top: 2px;
    }

    /* Tlačítka */
    .btn {
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--teal-deep), var(--teal-glow));
      color: white;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .btn-ghost {
      background: white;
      color: var(--teal-deep);
      border: 2px solid var(--teal-pale);
    }
    .btn-ghost:hover {
      background: var(--teal-pale);
      border-color: var(--teal-light);
    }
    .btn-icon {
      padding: 8px;
      width: 36px;
      height: 36px;
      justify-content: center;
    }

    /* ========== SEARCH & CATEGORIES ========== */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-wrapper {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrapper::before {
      content: '🔍';
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.6;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
      padding: 14px 18px 14px 44px;
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      background: white;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--teal-light);
      box-shadow: var(--shadow-md);
    }

    .categories {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .cat-btn {
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 18px;
      border: 2px solid var(--teal-pale);
      border-radius: 999px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .cat-btn:hover {
      border-color: var(--teal-light);
      transform: translateY(-1px);
    }
    .cat-btn.active {
      background: linear-gradient(135deg, var(--teal-deep), var(--teal-glow));
      color: white;
      border-color: var(--teal-deep);
      box-shadow: var(--shadow-sm);
    }

    /* ========== APPS GRID ========== */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .app-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .app-screenshot {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, var(--teal-light), var(--teal-pale));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      position: relative;
      overflow: hidden;
    }
    .app-screenshot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .app-screenshot::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(10, 124, 121, 0.1));
    }

    .app-body {
      padding: 20px 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }
    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--teal-deep);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-category {
      font-size: 12px;
      font-weight: 600;
      color: var(--teal-glow);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .app-description {
      font-size: 14px;
      color: var(--text-soft);
      line-height: 1.5;
      flex: 1;
    }
    .app-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .app-actions .btn {
      padding: 8px 14px;
      font-size: 13px;
    }
    .app-actions .btn-icon {
      padding: 8px;
      width: 34px;
      height: 34px;
      font-size: 14px;
    }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--teal-deep);
      color: white;
      padding: 14px 24px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: var(--shadow-lg);
      z-index: 200;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-soft);
      grid-column: 1 / -1;
    }
    .empty-state .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.6;
    }
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--teal-deep);
      margin-bottom: 8px;
    }

    /* ========== MOBILE ========== */
    @media (max-width: 640px) {
      .container { padding: 20px 14px 14px; }
      .apps-grid { grid-template-columns: 1fr; gap: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <span class="brand-logo">📚</span>
        <div>
          <h1 class="brand-title">TeeLibrary</h1>
          <div class="brand-subtitle">Moje knihovna webových aplikací</div>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <div class="search-wrapper">
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Hledat aplikaci..."
          autocomplete="off"
        />
      </div>
    </div>

    <nav class="categories" id="categories">
      <!-- kategorie se vykreslují z JS -->
    </nav>

    <main class="apps-grid" id="apps-grid"></main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ========================================================== -->
  <!-- ====================== DATA & LOGIKA ====================== -->
  <!-- ========================================================== -->
  <script>
    // ==========================================================
    // 📚 KNIHOVNA — tady se přidávají položky
    // ==========================================================
    // Chceš přidat appku? Stačí dopsat řádek do APPS:
    //   { name:'Název', url:'https://...', category:'aplikace', emoji:'✨', description:'Popisek.' }
    // Kategorie (category) musí odpovídat 'id' některé položky v CATEGORIES.
    // ==========================================================

    const CATEGORIES = [
      { id: 'terapie',    name: 'Terapie',     emoji: '🧠' },
      { id: 'aplikace',   name: 'Aplikace',    emoji: '💻' },
      { id: 'komunikace', name: 'Komunikace',  emoji: '💬' },
      { id: 'klienti',    name: 'Pro klienty', emoji: '🤝' },
      { id: 'ostatni',    name: 'Ostatní',     emoji: '📦' },
    ];

    const APPS = [
      {
        name: 'FirstMap',
        url: 'https://firstmap-rosy.vercel.app/',
        category: 'aplikace',
        emoji: '🗺️',
        description: 'Interaktivní mapa pro vizualizaci dat.',
      },
      {
        name: 'Terka Pro',
        url: 'https://terka-pro.vercel.app/',
        category: 'aplikace',
        emoji: '✨',
        description: 'Profesionální nástroj pro každodenní práci.',
      },
      {
        name: 'Digiterapie Studio',
        url: 'https://digistudio-eta.vercel.app/',
        category: 'terapie',
        emoji: '🧠',
        description: 'AI Creative Tools for Therapists — kreativní nástroje pro terapeuty.',
      },
      {
        name: 'Genogram',
        url: 'https://genogram-ebon.vercel.app/',
        category: 'terapie',
        emoji: '🌳',
        description: 'Interní nástroj na tvorbu genogramů v rodinách.',
      },
      {
        name: 'SandTray Portal',
        url: 'https://sandtray-portal.vercel.app/',
        category: 'terapie',
        emoji: '🏖️',
        description: 'Portál pro práci s pískovištěm (sand tray) v terapii.',
      },
      {
        name: 'Gabina Pro',
        url: 'https://gabina-pro.vercel.app/',
        category: 'komunikace',
        emoji: '💜',
        description: 'Profesionální komunikační nástroj.',
      },
      {
        name: 'Erasmus+ Göteborg 2026',
        url: 'https://erasmus-goteborg.vercel.app/',
        category: 'ostatni',
        emoji: '🌍',
        description: 'Projektová stránka pro Erasmus+ výjezd do Göteborgu 2026.',
      },
      {
        name: 'Erasmus+ Slovensko',
        url: 'https://erasmus-amalthea-sk.vercel.app/#/',
        category: 'ostatni',
        emoji: '🇸🇰',
        description: 'Erasmus+ projekt pro Slovensko (Amalthea).',
      },
      {
        name: 'Tři domečky',
        url: 'https://gemini.google.com/share/cbc88704321d',
        category: 'klienti',
        emoji: '🏡',
        description: 'Zjišťování aktuálních potřeb dětí.',
      },
      {
        name: 'Loď poznání',
        url: 'https://gemini.google.com/share/8fc64a1d5717',
        category: 'klienti',
        emoji: '⛵',
        description: 'Nástroj na podporu spolupráce.',
      },
      {
        name: 'Životní film',
        url: 'https://gemini.google.com/share/ae96592c2c5e',
        category: 'klienti',
        emoji: '🎬',
        description: 'Mapování sebeobrazu.',
      },
    ];

    // ==========================================================
    // State
    // ==========================================================
    let currentCategory = 'all';
    let currentSearch = '';

    // ==========================================================
    // DOM refs
    // ==========================================================
    const $ = (sel) => document.querySelector(sel);
    const grid = $('#apps-grid');
    const categoriesEl = $('#categories');
    const searchInput = $('#search-input');
    const toastEl = $('#toast');

    // ==========================================================
    // Helpers
    // ==========================================================
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 2200);
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, (c) => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;',
      }[c]));
    }

    // ==========================================================
    // Rendering
    // ==========================================================
    function renderCategories() {
      const tabs = [{ id: 'all', name: 'Vše', emoji: '✨' }, ...CATEGORIES];
      categoriesEl.innerHTML = tabs
        .map((c) => {
          const active = c.id === currentCategory ? 'active' : '';
          return `
            <button class="cat-btn ${active}" data-cat="${c.id}">
              <span>${c.emoji || '🏷'}</span>
              <span>${escapeHtml(c.name)}</span>
            </button>`;
        })
        .join('');

      categoriesEl.querySelectorAll('.cat-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          currentCategory = btn.dataset.cat;
          renderCategories();
          renderApps();
        });
      });
    }

    function renderApps() {
      const q = currentSearch.trim().toLowerCase();
      let list = APPS.slice();

      if (currentCategory !== 'all') {
        list = list.filter((a) => a.category === currentCategory);
      }
      if (q) {
        list = list.filter(
          (a) =>
            (a.name || '').toLowerCase().includes(q) ||
            (a.description || '').toLowerCase().includes(q)
        );
      }

      if (!list.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h3>Zatím nic tady není</h3>
            <p>${q ? 'Zkus jiný vyhledávací výraz.' : 'Tady se objeví tvoje aplikace.'}</p>
          </div>`;
        return;
      }

      grid.innerHTML = list
        .map((a, i) => {
          const cat = CATEGORIES.find((c) => c.id === a.category);
          const catLabel = cat ? `${cat.emoji} ${escapeHtml(cat.name)}` : '—';
          const screenshot = a.screenshot
            ? `<img src="${escapeHtml(a.screenshot)}" alt="${escapeHtml(a.name)}" loading="lazy" />`
            : `<span>${a.emoji || '📦'}</span>`;
          return `
            <article class="app-card" style="animation-delay:${i * 40}ms">
              <div class="app-screenshot">${screenshot}</div>
              <div class="app-body">
                <div class="app-category">${catLabel}</div>
                <h3 class="app-title">
                  <span>${a.emoji || ''}</span>
                  <span>${escapeHtml(a.name)}</span>
                </h3>
                <p class="app-description">${escapeHtml(a.description)}</p>
                <div class="app-actions">
                  <button class="btn btn-primary" data-open="${escapeHtml(a.url)}">Otevřít</button>
                  <button class="btn btn-ghost btn-icon" data-copy="${escapeHtml(a.url)}" title="Kopírovat odkaz">📋</button>
                </div>
              </div>
            </article>`;
        })
        .join('');

      grid.querySelectorAll('[data-open]').forEach((b) =>
        b.addEventListener('click', () => window.open(b.dataset.open, '_blank', 'noopener'))
      );
      grid.querySelectorAll('[data-copy]').forEach((b) =>
        b.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(b.dataset.copy);
            toast('Odkaz zkopírován ✨');
          } catch {
            toast('Nelze kopírovat');
          }
        })
      );
    }

    // ==========================================================
    // Search
    // ==========================================================
    searchInput.addEventListener('input', (e) => {
      currentSearch = e.target.value;
      renderApps();
    });

    // ==========================================================
    // Service Worker
    // ==========================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((err) =>
          console.warn('SW registration failed:', err)
        );
      });
    }

    // ==========================================================
    // Boot
    // ==========================================================
    renderCategories();
    renderApps();
  </script>
</body>
</html>
